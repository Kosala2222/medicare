<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Appointments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f7ff; font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; min-height: 100vh; background: #ffffff; border-right: 1px solid #e6efff; position: fixed; top: 0; left: 0; }
        .sidebar .nav-link { color: #4a5568; padding: 12px 18px; border-radius: 10px; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { background: #e8f0ff; color: #1d4ed8; }
        .main { margin-left: 260px; }

        .navbar { background: #ffffff !important; }
        .navbar .navbar-brand { color: #0f172a; font-weight: 600; }

        .card { border: 1px solid #e6efff; border-radius: 16px; box-shadow: 0 6px 20px rgba(20, 63, 185, 0.06); }
        .table thead th { color: #64748b; font-weight: 600; background: #f1f6ff; border-bottom: 1px solid #e6efff; }
        .table tbody tr:hover { background: #f9fbff; }
        .badge { border-radius: 9999px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar p-3">
        <div class="d-flex align-items-center gap-2 mb-4">
            <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center" style="width:40px;height:40px;color:#fff;">D</div>
            <div>
                <div class="fw-bold" th:text="${doctor.fullName}">Dr. Name</div>
                <div class="text-muted small" th:text="${doctor.specialization}">Specialization</div>
            </div>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="/doctor/dashboard">Dashboard</a>
            <a class="nav-link active" href="/doctor/appointments">Appointment</a>
            <a class="nav-link" href="/doctor/calendar">Calendar</a>
            <a class="nav-link" href="/doctor/profile">Profile</a>
            <a class="nav-link" href="/doctor/login">Logout</a>
        </nav>
    </div>

    <!-- Main content -->
    <div class="main w-100">
        <nav class="navbar navbar-light bg-white border-bottom px-4 py-3">
            <span class="navbar-brand mb-0 h5">Appointments</span>
            <form class="d-flex" role="search">
                <input class="form-control rounded-12" type="search" placeholder="Search" aria-label="Search">
            </form>
        </nav>

        <div class="container-fluid py-4">
            <div class="card">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Patient</th>
                                <th>Time</th>
                                <th>Status</th>
                                <th>Notes</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="a : ${appointments}">
                                <td>
                                    <div class="fw-semibold" th:text="${a.patientName}">Patient</div>
                                    <div class="small text-muted" th:text="${a.patientEmail}">email</div>
                                </td>
                                <td th:text="${#temporals.format(a.appointmentDate,'dd MMM yyyy, hh:mm a')}"></td>
                                <td>
                                    <span class="badge" th:classappend="${a.status == 'Scheduled'} ? ' bg-warning text-dark' : (${a.status == 'Completed'} ? ' bg-success' : ' bg-secondary')" th:text="${a.status}"></span>
                                </td>
                                <td th:text="${a.notes}"></td>
                                <td>
                                    <a th:href="@{'/prescription/create/' + ${a.appointmentId}}" class="btn btn-sm btn-outline-success" th:if="${a.status=='Scheduled'}">Prescription</a>
                                    <form th:action="@{'/doctor/appointment/' + ${a.appointmentId} + '/complete'}" method="post" class="d-inline" th:if="${a.status=='Scheduled'}">
                                        <button class="btn btn-sm btn-outline-primary">Complete</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(appointments)}">
                                <td colspan="5" class="text-center text-muted">No appointments found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
