<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Prescription</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .prescription-form {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        .form-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 2rem;
            margin: 2rem auto;
            max-width: 900px;
        }
        .form-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f8f9fa;
        }
        .form-header h2 {
            color: #2c3e50;
            font-weight: 600;
        }
        .patient-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .medicine-selection {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        .medicine-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #007bff;
        }
        .btn-primary {
            background: linear-gradient(45deg, #007bff, #0056b3);
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-weight: 600;
        }
        .btn-success {
            background: linear-gradient(45deg, #28a745, #1e7e34);
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-weight: 600;
        }
        .category-select {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            padding: 10px 15px;
        }
        .medicine-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .selected-medicines {
            background: #e8f5e8;
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1rem;
        }
        .form-control:required {
            border-left: 3px solid #dc3545;
        }
    </style>
</head>
<body>
<div class="prescription-form">
    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h2><i class="fas fa-prescription-bottle-alt"></i> Create Prescription</h2>
                <p class="text-muted">Issue prescription for patient</p>
            </div>

            <!-- Display Error Messages -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong>Error!</strong> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Patient Information -->
            <div class="patient-info">
                <h5><i class="fas fa-user-md"></i> Patient Information</h5>
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>Name:</strong> <span th:text="${appointment.patientName}">N/A</span></p>
                        <p><strong>Email:</strong> <span th:text="${appointment.patientEmail}">N/A</span></p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>Contact:</strong> <span th:text="${appointment.contactNumber}">N/A</span></p>
                        <p><strong>Appointment Date:</strong> <span th:text="${#temporals.format(appointment.appointmentDate, 'dd MMMM yyyy, hh:mm a')}">N/A</span></p>
                    </div>
                </div>
            </div>

            <!-- Prescription Form -->
            <form th:action="@{/prescription/create}" th:object="${prescription}" method="post">
                <!-- Hidden required fields - Use th:field for proper binding -->
                <input type="hidden" th:field="*{doctorId}" th:value="${appointment.doctorId}">
                <input type="hidden" th:field="*{patientId}" th:value="${appointment.patientId}">
                <input type="hidden" th:field="*{appointmentId}" th:value="${appointment.appointmentId}">
                <input type="hidden" th:field="*{status}" value="Active">
                <input type="hidden" th:field="*{isUrgent}" value="false">

                <!-- Diagnosis (Required) -->
                <div class="mb-4">
                    <label for="diagnosis" class="form-label">
                        <i class="fas fa-stethoscope"></i> Diagnosis *
                    </label>
                    <textarea th:field="*{diagnosis}" class="form-control" rows="3"
                              placeholder="Enter diagnosis details..." required></textarea>
                    <div class="form-text text-danger" th:if="${#fields.hasErrors('diagnosis')}"
                         th:errors="*{diagnosis}">Diagnosis error</div>
                </div>

                <!-- Symptoms -->
                <div class="mb-4">
                    <label for="symptoms" class="form-label">
                        <i class="fas fa-exclamation-triangle"></i> Symptoms
                    </label>
                    <textarea th:field="*{symptoms}" class="form-control" rows="2"
                              placeholder="Enter patient symptoms..."></textarea>
                </div>

                <!-- Medicine Selection -->
                <div class="medicine-selection">
                    <h5><i class="fas fa-pills"></i> Medicine Selection</h5>

                    <!-- Category Selection -->
                    <div class="mb-3">
                        <label for="category" class="form-label">Select Medicine Category</label>
                        <select id="category" class="form-select category-select" onchange="loadMedicines()">
                            <option value="">Select a category...</option>
                            <option th:each="category : ${categories}" th:value="${category}" th:text="${category}"></option>
                        </select>
                    </div>

                    <!-- Medicine List -->
                    <div id="medicineList" class="medicine-list" style="display: none;">
                        <h6>Available Medicines:</h6>
                        <div id="medicinesContainer"></div>
                    </div>

                    <!-- Selected Medicines -->
                    <div id="selectedMedicines" class="selected-medicines" style="display: none;">
                        <h6><i class="fas fa-check-circle"></i> Selected Medicines:</h6>
                        <div id="selectedList"></div>
                    </div>

                    <!-- Medicine Form Fields (will be populated by JavaScript) -->
                    <div id="medicineFormFields"></div>
                </div>

                <!-- Notes -->
                <div class="mb-4">
                    <label for="notes" class="form-label">
                        <i class="fas fa-notes-medical"></i> Additional Notes
                    </label>
                    <textarea th:field="*{notes}" class="form-control" rows="3"
                              placeholder="Enter any additional notes or instructions..."></textarea>
                </div>

                <!-- Follow-up Date -->
                <div class="mb-4">
                    <label for="followUpDate" class="form-label">
                        <i class="fas fa-calendar-alt"></i> Follow-up Date (Optional)
                    </label>
                    <input type="datetime-local" th:field="*{followUpDate}" class="form-control" id="followUpDate">
                </div>

                <!-- Urgent Checkbox -->
                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="isUrgentCheckbox" onchange="updateUrgentField()">
                        <label class="form-check-label" for="isUrgentCheckbox">
                            <i class="fas fa-exclamation-circle text-danger"></i> Mark as Urgent
                        </label>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="d-flex justify-content-between">
                    <a href="/doctor/dashboard" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Dashboard
                    </a>
                    <button type="submit" class="btn btn-success" onclick="validateForm()">
                        <i class="fas fa-save"></i> Create Prescription
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let selectedMedicines = [];

    function updateUrgentField() {
        const checkbox = document.getElementById('isUrgentCheckbox');
        const hiddenField = document.querySelector('input[name="isUrgent"]');
        hiddenField.value = checkbox.checked;
    }

    function validateForm() {
        const diagnosis = document.querySelector('textarea[name="diagnosis"]').value;
        if (!diagnosis.trim()) {
            alert('Please enter a diagnosis');
            return false;
        }
        return true;
    }

    function loadMedicines() {
        const category = document.getElementById('category').value;
        if (!category) {
            document.getElementById('medicineList').style.display = 'none';
            return;
        }

        fetch(`/prescription/medicines/${encodeURIComponent(category)}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(medicines => {
                const container = document.getElementById('medicinesContainer');
                container.innerHTML = '';

                if (medicines.length === 0) {
                    container.innerHTML = '<p class="text-muted">No medicines found in this category.</p>';
                } else {
                    medicines.forEach(medicine => {
                        const medicineDiv = document.createElement('div');
                        medicineDiv.className = 'medicine-item';
                        medicineDiv.innerHTML = `
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1">${medicine.medicineName}</h6>
                                    <small class="text-muted">${medicine.genericName} - ${medicine.strength}</small>
                                    <br><small class="text-info">${medicine.dosageForm}</small>
                                    <br><small class="text-success">Price: $${medicine.unitPrice || '0.00'}</small>
                                </div>
                                <button type="button" class="btn btn-sm btn-outline-primary"
                                        onclick="addMedicine(${medicine.medicineId}, '${medicine.medicineName.replace(/'/g, "\\'")}', '${medicine.strength.replace(/'/g, "\\'")}', '${medicine.genericName.replace(/'/g, "\\'")}', '${medicine.dosageForm.replace(/'/g, "\\'")}', ${medicine.unitPrice || 0})">
                                    <i class="fas fa-plus"></i> Add
                                </button>
                            </div>
                        `;
                        container.appendChild(medicineDiv);
                    });
                }

                document.getElementById('medicineList').style.display = 'block';
            })
            .catch(error => {
                console.error('Error loading medicines:', error);
                document.getElementById('medicinesContainer').innerHTML = '<p class="text-danger">Error loading medicines. Please try again.</p>';
                document.getElementById('medicineList').style.display = 'block';
            });
    }

    function addMedicine(medicineId, medicineName, strength, genericName, dosageForm, unitPrice) {
        if (!selectedMedicines.find(m => m.id === medicineId)) {
            selectedMedicines.push({
                id: medicineId,
                name: medicineName,
                strength: strength,
                genericName: genericName,
                dosageForm: dosageForm,
                unitPrice: unitPrice,
                dosage: '1 tablet',
                frequency: 'twice daily',
                duration: '7 days',
                instructions: ''
            });
            updateSelectedMedicines();
        } else {
            alert('This medicine is already selected.');
        }
    }

    function removeMedicine(medicineId) {
        selectedMedicines = selectedMedicines.filter(m => m.id !== medicineId);
        updateSelectedMedicines();
    }

    function updateSelectedMedicines() {
        const container = document.getElementById('selectedList');
        const selectedDiv = document.getElementById('selectedMedicines');
        const formFieldsContainer = document.getElementById('medicineFormFields');

        if (selectedMedicines.length === 0) {
            selectedDiv.style.display = 'none';
            formFieldsContainer.innerHTML = '';
            return;
        }

        selectedDiv.style.display = 'block';
        container.innerHTML = '';
        formFieldsContainer.innerHTML = '';

        selectedMedicines.forEach((medicine, index) => {
            // Create display for selected medicine
            const medicineDiv = document.createElement('div');
            medicineDiv.className = 'mb-3 p-3 border rounded';
            medicineDiv.innerHTML = `
                <div class="row">
                    <div class="col-md-3">
                        <strong>${medicine.name}</strong><br>
                        <small class="text-muted">${medicine.strength}</small>
                    </div>
                    <div class="col-md-2">
                        <label class="small">Dosage</label>
                        <input type="text" class="form-control form-control-sm"
                               value="${medicine.dosage}"
                               onchange="updateMedicineField(${medicine.id}, 'dosage', this.value)">
                    </div>
                    <div class="col-md-2">
                        <label class="small">Frequency</label>
                        <input type="text" class="form-control form-control-sm"
                               value="${medicine.frequency}"
                               onchange="updateMedicineField(${medicine.id}, 'frequency', this.value)">
                    </div>
                    <div class="col-md-2">
                        <label class="small">Duration</label>
                        <input type="text" class="form-control form-control-sm"
                               value="${medicine.duration}"
                               onchange="updateMedicineField(${medicine.id}, 'duration', this.value)">
                    </div>
                    <div class="col-md-2">
                        <label class="small">Instructions</label>
                        <input type="text" class="form-control form-control-sm"
                               value="${medicine.instructions}"
                               onchange="updateMedicineField(${medicine.id}, 'instructions', this.value)">
                    </div>
                    <div class="col-md-1">
                        <label class="small">&nbsp;</label>
                        <button type="button" class="btn btn-sm btn-outline-danger d-block"
                                onclick="removeMedicine(${medicine.id})">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            `;
            container.appendChild(medicineDiv);

            // Create hidden form fields
            createHiddenField('medicineIds', medicine.id);
            createHiddenField('dosages', medicine.dosage);
            createHiddenField('frequencies', medicine.frequency);
            createHiddenField('durations', medicine.duration);
            createHiddenField('instructions', medicine.instructions);
        });
    }

    function createHiddenField(name, value) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = name;
        input.value = value;
        document.getElementById('medicineFormFields').appendChild(input);
    }

    function updateMedicineField(medicineId, field, value) {
        const medicine = selectedMedicines.find(m => m.id === medicineId);
        if (medicine) {
            medicine[field] = value;
            // Update the hidden fields
            updateHiddenFields();
        }
    }

    function updateHiddenFields() {
        const formFieldsContainer = document.getElementById('medicineFormFields');
        formFieldsContainer.innerHTML = '';

        selectedMedicines.forEach(medicine => {
            createHiddenField('medicineIds', medicine.id);
            createHiddenField('dosages', medicine.dosage);
            createHiddenField('frequencies', medicine.frequency);
            createHiddenField('durations', medicine.duration);
            createHiddenField('instructions', medicine.instructions);
        });
    }

    // Initialize form validation
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('form');
        form.addEventListener('submit', function(event) {
            if (!validateForm()) {
                event.preventDefault();
            }
        });
    });
</script>
</body>
</html>
