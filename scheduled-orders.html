<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f6fb; font-family: 'Inter', sans-serif; }
        .sidebar { width: 260px; min-height: 100vh; background: #ffffff; border-right: 1px solid #eef0f4; position: fixed; top: 0; left: 0; }
        .sidebar .nav-link { color: #4a5568; padding: 12px 18px; border-radius: 10px; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { background: #eef6ff; color: #2563eb; }
        .main { margin-left: 260px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar p-3">
        <div class="d-flex align-items-center gap-2 mb-4">
            <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center" style="width:40px;height:40px;color:#fff;">D</div>
            <div>
                <div class="fw-bold" th:text="${doctor.fullName}">Dr. Name</div>
                <div class="text-muted small" th:text="${doctor.specialization}">Specialization</div>
            </div>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="/doctor/dashboard">Dashboard</a>
            <a class="nav-link" href="/doctor/appointments">Appointment</a>
            <a class="nav-link active" href="/doctor/calendar">Calendar</a>
            <a class="nav-link" href="/doctor/profile">Profile</a>
            <a class="nav-link" href="/doctor/login">Logout</a>
        </nav>
    </div>

    <!-- Main content -->
    <div class="main w-100">
        <nav class="navbar navbar-light bg-white border-bottom px-4 py-3">
            <span class="navbar-brand mb-0 h5">Calendar</span>
            <form class="d-flex" role="search">
                <input class="form-control rounded-12" type="search" placeholder="Search" aria-label="Search">
            </form>
        </nav>

        <div class="container-fluid py-4">
            <div class="card p-3">
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Appointments</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="a : ${appointments}">
                                <td th:text="${#temporals.format(a.appointmentDate,'dd MMM yyyy')}"></td>
                                <td>
                                    <div th:text="${a.patientName} + ' - ' + ${#temporals.format(a.appointmentDate,'hh:mm a')} + ' (' + ${a.status} + ')' "></div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(appointments)}">
                                <td colspan="2" class="text-center text-muted">No calendar entries</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
